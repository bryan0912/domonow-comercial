<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DomoNow · Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px; justify-content: center;
    }
    .login-logo-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 6px 18px rgba(130,10,209,.35);
    }
    .login-logo-text { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: var(--purple); }
    .login-title { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 6px; }
    .login-sub { font-size: 13.5px; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 14.5px; font-family: inherit;
      outline: none; transition: border-color .15s, background .25s;
    }
    .form-input:focus { border-color: var(--purple); background: var(--surface); }
    .form-input::placeholder { color: var(--muted2); }
    .login-btn {
      width: 100%; padding: 13px;
      background: var(--purple); color: #fff;
      border: none; border-radius: 11px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .15s; margin-top: 6px;
      box-shadow: 0 3px 12px rgba(130,10,209,.3);
    }
    .login-btn:hover { background: var(--purple-dark); box-shadow: 0 5px 18px rgba(130,10,209,.4); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      background: rgba(185,28,28,.08); border: 1px solid rgba(185,28,28,.2);
      border-radius: 9px; padding: 10px 14px;
      font-size: 13px; color: #b91c1c; margin-bottom: 16px;
      display: none;
    }
    [data-theme="dark"] .login-error { color: #f87171; background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.2); }
    .login-hint {
      text-align: center; font-size: 12px; color: var(--muted2); margin-top: 20px;
    }
    .login-hint strong { color: var(--muted); }
    .theme-toggle-login {
      position: fixed; top: 18px; right: 18px;
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: var(--muted); transition: all .15s;
    }
    .theme-toggle-login:hover { border-color: var(--purple); color: var(--purple); }
  </style>
</head>
<body>
  <button class="theme-toggle-login" id="themeBtn">🌙</button>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🏢</div>
        <div class="login-logo-text">DomoNow</div>
      </div>
      <div class="login-title">Bienvenido al equipo</div>
      <div class="login-sub">Ingresa tus credenciales para acceder a la plataforma comercial</div>

      <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>

      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input class="form-input" type="text" id="username" placeholder="tu.nombre" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn">Ingresar →</button>

      <div class="login-hint">
        Demo: <strong>brayan</strong> / <strong>domonow2025</strong> &nbsp;|&nbsp; <strong>admin</strong> / <strong>admin123</strong>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('dn_user')) window.location.href = 'app.html';

    // Theme
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    function setTheme(dark) {
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      themeBtn.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('dn-theme', dark ? 'dark' : 'light');
    }
    themeBtn.addEventListener('click', () => setTheme(html.getAttribute('data-theme') !== 'dark'));
    if (localStorage.getItem('dn-theme') === 'dark') setTheme(true);

    // Login
    function doLogin() {
      const user = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value;
      const found = DN_USERS.find(u => u.username === user && u.password === pass);
      const errEl = document.getElementById('loginError');
      if (found) {
        localStorage.setItem('dn_user', JSON.stringify({ username: found.username, name: found.name, role: found.role }));
        window.location.href = 'app.html';
      } else {
        errEl.style.display = 'block';
        document.getElementById('password').value = '';
      }
    }
    document.getElementById('loginBtn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>
</html>
